<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email подтверждён — LumiSound</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0A0B1A 0%, #1a1b2e 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 500px; width: 100%; text-align: center;
      background: rgba(255,255,255,0.05);
      border-radius: 24px; padding: 48px 32px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .icon {
      width: 80px; height: 80px; margin: 0 auto 24px;
      background: linear-gradient(135deg, #7B6DFF 0%, #FF5C6C 100%);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 40px;
    }
    h1 {
      font-size: 28px; font-weight: 700; margin-bottom: 12px;
      background: linear-gradient(135deg, #7B6DFF 0%, #FF5C6C 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    p {
      font-size: 16px; line-height: 1.6;
      color: rgba(255,255,255,0.7); margin-bottom: 12px;
    }
    .steps {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 20px 24px;
      margin: 24px 0; text-align: left;
    }
    .step {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 0; font-size: 14px; color: rgba(255,255,255,0.7);
    }
    .step:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.06); }
    .step-num {
      width: 28px; height: 28px; flex-shrink: 0;
      background: linear-gradient(135deg, #7B6DFF, #FF5C6C);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
    }
    .button {
      display: inline-block; padding: 14px 32px;
      background: linear-gradient(135deg, #7B6DFF 0%, #FF5C6C 100%);
      color: #fff; text-decoration: none; border-radius: 12px;
      font-weight: 600; font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .button:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(123,109,255,0.4); }
    .footer { margin-top: 32px; font-size: 14px; color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">✓</div>
    <h1>Email подтверждён!</h1>
    <p>Ваш email успешно подтверждён.<br>Теперь вы можете войти в приложение.</p>

    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <span>Откройте приложение LumiSound</span>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <span>Нажмите «Войти»</span>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <span>Введите email и пароль, которые вы указали при регистрации</span>
      </div>
    </div>

    <a href="lumisound://auth.callback" class="button">Открыть приложение</a>
    <div class="footer">LumiSound &copy; 2026</div>
  </div>
</body>
</html>
