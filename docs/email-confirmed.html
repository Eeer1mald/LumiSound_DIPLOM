<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email подтверждён — LumiSound</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0A0B1A 0%, #1a1b2e 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 500px; text-align: center;
      background: rgba(255,255,255,0.05);
      border-radius: 24px; padding: 48px 32px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .icon {
      width: 80px; height: 80px; margin: 0 auto 24px;
      background: linear-gradient(135deg, #7B6DFF 0%, #FF5C6C 100%);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 40px;
    }
    h1 {
      font-size: 28px; font-weight: 700; margin-bottom: 12px;
      background: linear-gradient(135deg, #7B6DFF 0%, #FF5C6C 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    p { font-size: 16px; line-height: 1.6; color: rgba(255,255,255,0.7); margin-bottom: 32px; }
    .button {
      display: inline-block; padding: 14px 32px;
      background: linear-gradient(135deg, #7B6DFF 0%, #FF5C6C 100%);
      color: #fff; text-decoration: none; border-radius: 12px;
      font-weight: 600; font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .button:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(123,109,255,0.4); }
    .footer { margin-top: 32px; font-size: 14px; color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">✓</div>
    <h1>Email подтверждён!</h1>
    <p>Ваш email успешно подтверждён.<br>Вернитесь в приложение и войдите с теми же данными.</p>
    <a href="lumisound://auth.callback" class="button">Вернуться в приложение</a>
    <div class="footer">LumiSound &copy; 2026</div>
  </div>
</body>
</html>
